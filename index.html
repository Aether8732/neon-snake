<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🐍 Neon Snake</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a1a;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100dvh;
  overflow: hidden;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: #fff;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}

#game-container {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  width: 100%;
  max-width: 500px;
  padding: 10px;
}

#hud {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 8px 16px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.1);
}

#hud span {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
}

#score-val { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
#high-val { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }
#level-val { color: #00ccff; text-shadow: 0 0 10px #00ccff; }

canvas {
  border-radius: 12px;
  border: 2px solid rgba(0, 255, 136, 0.3);
  box-shadow: 0 0 30px rgba(0, 255, 136, 0.15), inset 0 0 30px rgba(0,0,0,0.5);
  width: 100%;
  max-width: 400px;
  aspect-ratio: 1;
  display: block;
}

#overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  width: 90%;
}

#overlay h1 {
  font-size: 42px;
  font-weight: 900;
  background: linear-gradient(135deg, #00ff88, #00ccff, #ff00ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 8px;
  filter: drop-shadow(0 0 20px rgba(0,255,136,0.5));
}

#overlay p {
  font-size: 14px;
  color: rgba(255,255,255,0.6);
  margin-bottom: 20px;
  line-height: 1.5;
}

#overlay .final-score {
  font-size: 28px;
  color: #00ff88;
  font-weight: 800;
  margin: 10px 0;
  text-shadow: 0 0 15px #00ff88;
}

#start-btn {
  padding: 14px 40px;
  font-size: 18px;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  background: linear-gradient(135deg, #00ff88, #00ccff);
  color: #0a0a1a;
  cursor: pointer;
  transition: all 0.3s;
  box-shadow: 0 0 25px rgba(0,255,136,0.4);
  letter-spacing: 1px;
}

#start-btn:hover, #start-btn:active {
  transform: scale(1.05);
  box-shadow: 0 0 40px rgba(0,255,136,0.6);
}

/* D-Pad for mobile */
#dpad {
  display: grid;
  grid-template-columns: 64px 64px 64px;
  grid-template-rows: 64px 64px 64px;
  gap: 4px;
  margin-top: 8px;
}

.dpad-btn {
  width: 64px;
  height: 64px;
  border-radius: 16px;
  border: 2px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.07);
  color: rgba(255,255,255,0.7);
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.dpad-btn:active {
  background: rgba(0,255,136,0.3);
  border-color: #00ff88;
  color: #00ff88;
  transform: scale(0.92);
}

.dpad-btn.empty { background: none; border: none; cursor: default; }

#pause-btn {
  position: absolute;
  top: 60px;
  right: 16px;
  width: 40px;
  height: 40px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.08);
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  z-index: 5;
  display: flex;
  align-items: center;
  justify-content: center;
}

@media (min-width: 768px) {
  #dpad { display: none; }
}
</style>
</head>
<body>
<div id="game-container">
  <div id="hud">
    <span>🐍 <span id="score-val">0</span></span>
    <span>LV <span id="level-val">1</span></span>
    <span>👑 <span id="high-val">0</span></span>
  </div>

  <button id="pause-btn" ontouchstart="togglePause(); event.stopPropagation()" onclick="togglePause()">⏸</button>

  <canvas id="game"></canvas>

  <div id="overlay">
    <h1>🐍 NEON SNAKE</h1>
    <p>Eat food to grow.<br>Avoid walls & yourself!</p>
    <button id="start-btn" ontouchstart="startGame(); event.stopPropagation()" onclick="startGame()">PLAY</button>
  </div>

  <div id="dpad">
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" ontouchstart="setDir(0,-1); event.stopPropagation()" onclick="setDir(0,-1)">▲</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" ontouchstart="setDir(-1,0); event.stopPropagation()" onclick="setDir(-1,0)">◀</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" ontouchstart="setDir(1,0); event.stopPropagation()" onclick="setDir(1,0)">▶</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" ontouchstart="setDir(0,1); event.stopPropagation()" onclick="setDir(0,1)">▼</div>
    <div class="dpad-btn empty"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const pauseBtn = document.getElementById('pause-btn');

// High-DPI setup
const GRID = 20;
let COLS, ROWS, CELL, W, H;

function resize() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  W = rect.width;
  H = rect.height;
  CELL = Math.floor(Math.min(W, H) / GRID);
  COLS = GRID;
  ROWS = GRID;
  // Center the grid
  offsetX = Math.floor((W - COLS * CELL) / 2);
  offsetY = Math.floor((H - ROWS * CELL) / 2);
}
let offsetX = 0, offsetY = 0;
resize();
window.addEventListener('resize', resize);

// Game state
let snake, dir, nextDir, food, score, highScore, level, speed;
let running = false;
let paused = false;
let gameLoop;
let particles = [];

highScore = parseInt(localStorage.getItem('neonSnakeHigh') || '0');
document.getElementById('high-val').textContent = highScore;

function startGame() {
  resize();
  const startX = Math.floor(COLS / 2);
  const startY = Math.floor(ROWS / 2);
  snake = [
    { x: startX, y: startY },
    { x: startX - 1, y: startY },
    { x: startX - 2, y: startY },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  level = 1;
  speed = 150;
  paused = false;
  particles = [];
  overlay.style.display = 'none';
  pauseBtn.style.display = 'flex';
  spawnFood();
  updateHUD();
  running = true;
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(tick, speed);
  requestAnimationFrame(render);
}

function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function tick() {
  if (paused) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return gameOver();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    // Particles
    for (let i = 0; i < 12; i++) {
      particles.push({
        x: offsetX + food.x * CELL + CELL / 2,
        y: offsetY + food.y * CELL + CELL / 2,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        life: 1,
        color: ['#00ff88', '#00ccff', '#ff00ff', '#ffaa00'][Math.floor(Math.random() * 4)]
      });
    }
    spawnFood();
    // Level up every 50 points
    const newLevel = Math.floor(score / 50) + 1;
    if (newLevel > level) {
      level = newLevel;
      speed = Math.max(60, 150 - (level - 1) * 15);
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, speed);
    }
    updateHUD();
  } else {
    snake.pop();
  }
}

function gameOver() {
  running = false;
  clearInterval(gameLoop);
  if (score > highScore) {
    highScore = score;
    localStorage.setItem('neonSnakeHigh', highScore);
    document.getElementById('high-val').textContent = highScore;
  }
  pauseBtn.style.display = 'none';
  overlay.style.display = 'block';
  overlay.innerHTML = `
    <h1>💀 GAME OVER</h1>
    <div class="final-score">Score: ${score}</div>
    <p>Level ${level} reached!</p>
    <button id="start-btn" ontouchstart="startGame(); event.stopPropagation()" onclick="startGame()">PLAY AGAIN</button>
  `;
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('level-val').textContent = level;
}

function setDir(x, y) {
  if (!running) return;
  // Prevent 180° reversal
  if (dir.x === -x && dir.y === -y) return;
  if (x !== 0 && dir.x === x) return;
  if (y !== 0 && dir.y === y) return;
  nextDir = { x, y };
}

function togglePause() {
  if (!running) return;
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '⏸';
}

// Keyboard
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };
  if (map[e.key]) { setDir(...map[e.key]); e.preventDefault(); }
  if (e.key === ' ' || e.key === 'p') { togglePause(); e.preventDefault(); }
});

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => { touchStart = e.touches[0]; }, { passive: true });
canvas.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.clientX;
  const dy = e.changedTouches[0].clientY - touchStart.clientY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  touchStart = null;
}, { passive: true });

// Render
let foodPulse = 0;
function render() {
  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(offsetX + x * CELL, offsetY);
    ctx.lineTo(offsetX + x * CELL, offsetY + ROWS * CELL);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(offsetX, offsetY + y * CELL);
    ctx.lineTo(offsetX + COLS * CELL, offsetY + y * CELL);
    ctx.stroke();
  }

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.03;
    if (p.life <= 0) return false;
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3 * p.life, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    return true;
  });

  // Food
  foodPulse += 0.08;
  const pulse = 1 + Math.sin(foodPulse) * 0.15;
  const fx = offsetX + food.x * CELL + CELL / 2;
  const fy = offsetY + food.y * CELL + CELL / 2;
  const fr = (CELL / 2 - 2) * pulse;

  ctx.shadowColor = '#ff00ff';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff00ff';
  ctx.beginPath();
  ctx.arc(fx, fy, fr, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#ff88ff';
  ctx.beginPath();
  ctx.arc(fx, fy, fr * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Snake
  snake.forEach((seg, i) => {
    const x = offsetX + seg.x * CELL;
    const y = offsetY + seg.y * CELL;
    const t = i / snake.length;

    // Body color gradient from head to tail
    const r = Math.floor(0 + t * 0);
    const g = Math.floor(255 - t * 100);
    const b = Math.floor(136 + t * 100);
    const color = `rgb(${r},${g},${b})`;

    ctx.shadowColor = i === 0 ? '#00ff88' : color;
    ctx.shadowBlur = i === 0 ? 18 : 8;

    const radius = i === 0 ? 5 : 4;
    const pad = 1;

    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.roundRect(x + pad, y + pad, CELL - pad * 2, CELL - pad * 2, radius);
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#fff';
      const ex1 = x + CELL / 2 + (dir.x * 3) + (dir.y * -2) - 2;
      const ey1 = y + CELL / 2 + (dir.y * 3) + (dir.x * -2) - 2;
      const ex2 = x + CELL / 2 + (dir.x * 3) + (dir.y * 2) - 2;
      const ey2 = y + CELL / 2 + (dir.y * 3) + (dir.x * 2) - 2;
      ctx.beginPath();
      ctx.arc(ex1, ey1, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(ex2, ey2, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  ctx.shadowBlur = 0;

  // Pause overlay
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#00ff88';
    ctx.font = 'bold 36px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ PAUSED', W / 2, H / 2);
    ctx.font = '16px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('Tap ▶ to resume', W / 2, H / 2 + 30);
  }

  if (running || particles.length > 0) {
    requestAnimationFrame(render);
  }
}
</script>
</body>
</html>
