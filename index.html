<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover, maximum-scale=1.0">
<title>🚀 Space Defender</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --gap: 6px;
  --pad: min(10px, 2vw);
}

html, body {
  width: 100%;
  height: 100dvh;
  overflow: hidden;
  background: #06060f;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  color: #e0e0e0;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ===== LAYOUT ===== */
#shell {
  display: flex;
  flex-direction: column;
  width: 100%;
  height: 100dvh;
  max-width: 520px;
  margin: 0 auto;
  padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0) env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
}

/* Status bar — fixed height */
#status {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--pad);
  gap: var(--gap);
}

.stat-pill {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 4px;
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  font-size: clamp(12px, 3.2vw, 15px);
  font-weight: 700;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.stat-pill .label { opacity: 0.5; font-size: 0.85em; }
.stat-pill .value { font-variant-numeric: tabular-nums; }
.pill-score .value { color: #4ade80; }
.pill-wave .value { color: #60a5fa; }
.pill-lives .value { color: #f87171; }

/* Game canvas — fills remaining space */
#canvas-wrap {
  flex: 1 1 auto;
  position: relative;
  min-height: 0;
  margin: 0 var(--pad);
  border-radius: 12px;
  overflow: hidden;
  border: 1.5px solid rgba(96,165,250,0.25);
  box-shadow: 0 0 40px rgba(96,165,250,0.08);
}

canvas#game {
  display: block;
  width: 100%;
  height: 100%;
}

/* Controls bar — fixed height */
#controls {
  flex: 0 0 auto;
  display: flex;
  align-items: stretch;
  gap: var(--gap);
  padding: var(--pad);
}

.ctrl-btn {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,0.07);
  border: 1.5px solid rgba(255,255,255,0.1);
  color: #ccc;
  font-size: clamp(20px, 6vw, 28px);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s, border-color 0.1s;
  touch-action: manipulation;
}

.ctrl-btn .btn-label {
  font-size: clamp(10px, 2.8vw, 12px);
  font-weight: 600;
  opacity: 0.5;
  letter-spacing: 0.3px;
}

.ctrl-btn:active, .ctrl-btn.active {
  background: rgba(96,165,250,0.2);
  border-color: #60a5fa;
  color: #60a5fa;
}

.ctrl-btn.fire:active, .ctrl-btn.fire.active {
  background: rgba(248,113,113,0.25);
  border-color: #f87171;
  color: #f87171;
}

/* ===== SCREENS (overlay on canvas) ===== */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background: rgba(6,6,15,0.88);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 20;
  text-align: center;
  padding: 20px;
  transition: opacity 0.3s;
}

.screen[hidden] { display: none; }

.screen h1 {
  font-size: clamp(28px, 8vw, 40px);
  font-weight: 900;
  background: linear-gradient(135deg, #4ade80, #60a5fa, #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.2;
}

.screen .subtitle {
  font-size: clamp(13px, 3.5vw, 15px);
  color: rgba(255,255,255,0.5);
  line-height: 1.5;
  max-width: 300px;
}

.screen .score-display {
  font-size: clamp(36px, 10vw, 52px);
  font-weight: 900;
  color: #4ade80;
  text-shadow: 0 0 30px rgba(74,222,128,0.4);
  font-variant-numeric: tabular-nums;
}

.screen .score-label {
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.screen .stats-row {
  display: flex;
  gap: 24px;
  margin: 4px 0;
}

.screen .stats-row div {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.screen .stats-row .num {
  font-size: 20px;
  font-weight: 800;
  color: #60a5fa;
  font-variant-numeric: tabular-nums;
}

.screen .stats-row .lbl {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
}

.btn-primary {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  padding: 14px 36px;
  font-size: clamp(16px, 4vw, 18px);
  font-weight: 800;
  letter-spacing: 0.5px;
  color: #06060f;
  background: linear-gradient(135deg, #4ade80, #60a5fa);
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 4px 25px rgba(96,165,250,0.35);
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: transform 0.1s, box-shadow 0.2s;
}

.btn-primary:active {
  transform: scale(0.95);
  box-shadow: 0 2px 15px rgba(96,165,250,0.3);
}
</style>
</head>
<body>

<div id="shell">
  <!-- Status Bar -->
  <div id="status">
    <div class="stat-pill pill-score">
      <span class="label">SCORE</span>
      <span class="value" id="score-el">0</span>
    </div>
    <div class="stat-pill pill-wave">
      <span class="label">WAVE</span>
      <span class="value" id="wave-el">1</span>
    </div>
    <div class="stat-pill pill-lives">
      <span class="label">LIVES</span>
      <span class="value" id="lives-el">♥♥♥</span>
    </div>
  </div>

  <!-- Game Canvas -->
  <div id="canvas-wrap">
    <canvas id="game"></canvas>

    <!-- START SCREEN -->
    <div class="screen" id="start-screen">
      <h1>🚀 SPACE<br>DEFENDER</h1>
      <p class="subtitle">Move your ship to dodge asteroids.<br>Tap FIRE to shoot them down!<br>Survive as many waves as you can.</p>
      <button class="btn-primary" id="start-btn">▶ START GAME</button>
    </div>

    <!-- PAUSE SCREEN -->
    <div class="screen" id="pause-screen" hidden>
      <h1>⏸ PAUSED</h1>
      <button class="btn-primary" id="resume-btn">▶ RESUME</button>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen" id="over-screen" hidden>
      <h1>💥 GAME OVER</h1>
      <div class="score-display" id="final-score">0</div>
      <div class="score-label">final score</div>
      <div class="stats-row">
        <div>
          <span class="num" id="final-wave">1</span>
          <span class="lbl">Wave</span>
        </div>
        <div>
          <span class="num" id="final-destroyed">0</span>
          <span class="lbl">Destroyed</span>
        </div>
        <div>
          <span class="num" id="final-best">0</span>
          <span class="lbl">Best</span>
        </div>
      </div>
      <button class="btn-primary" id="retry-btn">↻ PLAY AGAIN</button>
    </div>
  </div>

  <!-- Control Buttons -->
  <div id="controls">
    <button class="ctrl-btn" id="btn-left">
      <span>◀</span>
      <span class="btn-label">LEFT</span>
    </button>
    <button class="ctrl-btn fire" id="btn-fire">
      <span>🔥</span>
      <span class="btn-label">FIRE</span>
    </button>
    <button class="ctrl-btn" id="btn-right">
      <span>▶</span>
      <span class="btn-label">RIGHT</span>
    </button>
  </div>
</div>

<script>
(function () {
  'use strict';

  /* ========== CANVAS ========== */
  const wrap = document.getElementById('canvas-wrap');
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    const rect = wrap.getBoundingClientRect();
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = rect.width;
    H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  /* ========== STATE ========== */
  const STATE = { start: 0, playing: 1, paused: 2, over: 3 };
  let state = STATE.start;

  let score = 0;
  let wave = 1;
  let lives = 3;
  let destroyed = 0;
  let bestScore = parseInt(localStorage.getItem('sd_best') || '0');

  // Player
  let player = { x: 0, y: 0, w: 36, h: 36, speed: 5 };
  let moveLeft = false;
  let moveRight = false;

  // Game objects
  let bullets = [];
  let enemies = [];
  let particles = [];
  let stars = [];

  // Timing
  let lastTime = 0;
  let enemyTimer = 0;
  let shootCooldown = 0;
  let animId = null;

  /* ========== STARS (background) ========== */
  function initStars() {
    stars = [];
    for (let i = 0; i < 80; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.5 + 0.3,
        speed: Math.random() * 0.4 + 0.1,
        bright: Math.random()
      });
    }
  }

  /* ========== HELPERS ========== */
  function spawnEnemy() {
    const size = Math.random() * 16 + 14;
    enemies.push({
      x: Math.random() * (W - size * 2) + size,
      y: -size,
      r: size,
      speed: (Math.random() * 1.2 + 0.6) * (1 + wave * 0.15),
      rot: 0,
      rotSpeed: (Math.random() - 0.5) * 0.08,
      vertices: makeAsteroidVerts(size)
    });
  }

  function makeAsteroidVerts(r) {
    const verts = [];
    const n = 8 + Math.floor(Math.random() * 5);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const d = r * (0.7 + Math.random() * 0.3);
      verts.push({ a, d });
    }
    return verts;
  }

  function makeExplosion(x, y, r, color) {
    const count = Math.floor(r * 1.5) + 8;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 1,
        decay: 0.015 + Math.random() * 0.02,
        r: Math.random() * 3 + 1,
        color
      });
    }
  }

  function shoot() {
    if (shootCooldown > 0) return;
    bullets.push({
      x: player.x,
      y: player.y - player.h / 2 - 4,
      w: 4,
      h: 14,
      speed: 9
    });
    shootCooldown = 12; // frames
  }

  function damagePlayer() {
    lives--;
    updateHUD();
    makeExplosion(player.x, player.y, 30, '#f87171');
    if (lives <= 0) gameOver();
  }

  function updateHUD() {
    document.getElementById('score-el').textContent = score;
    document.getElementById('wave-el').textContent = wave;
    document.getElementById('lives-el').textContent = '♥'.repeat(Math.max(0, lives));
  }

  function showScreen(id) {
    ['start-screen', 'pause-screen', 'over-screen'].forEach(s => {
      document.getElementById(s).hidden = (s !== id);
    });
  }

  /* ========== GAME FLOW ========== */
  function startGame() {
    resize();
    initStars();
    score = 0;
    wave = 1;
    lives = 3;
    destroyed = 0;
    bullets = [];
    enemies = [];
    particles = [];
    player.x = W / 2;
    player.y = H - 60;
    moveLeft = false;
    moveRight = false;
    enemyTimer = 0;
    shootCooldown = 0;
    updateHUD();
    state = STATE.playing;
    showScreen(null);
    lastTime = performance.now();
    if (!animId) animId = requestAnimationFrame(loop);
  }

  function togglePause() {
    if (state === STATE.playing) {
      state = STATE.paused;
      showScreen('pause-screen');
    } else if (state === STATE.paused) {
      state = STATE.playing;
      showScreen(null);
      lastTime = performance.now();
    }
  }

  function gameOver() {
    state = STATE.over;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('sd_best', bestScore);
    }
    document.getElementById('final-score').textContent = score;
    document.getElementById('final-wave').textContent = wave;
    document.getElementById('final-destroyed').textContent = destroyed;
    document.getElementById('final-best').textContent = bestScore;
    showScreen('over-screen');
  }

  /* ========== MAIN LOOP ========== */
  function loop(now) {
    animId = requestAnimationFrame(loop);
    const dt = Math.min((now - lastTime) / 16.667, 3); // normalize to ~60fps, cap at 3x
    lastTime = now;

    update(dt);
    draw();
  }

  function update(dt) {
    // Always update particles & stars for visual continuity
    // Stars
    stars.forEach(s => {
      s.y += s.speed * dt;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    });

    // Particles
    particles = particles.filter(p => {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life -= p.decay * dt;
      return p.life > 0;
    });

    if (state !== STATE.playing) return;

    // Cooldowns
    if (shootCooldown > 0) shootCooldown -= dt;

    // Player movement
    if (moveLeft) player.x -= player.speed * dt;
    if (moveRight) player.x += player.speed * dt;
    player.x = Math.max(player.w / 2, Math.min(W - player.w / 2, player.x));

    // Auto-fire (held down)
    if (fireHeld) shoot();

    // Bullets
    bullets = bullets.filter(b => {
      b.y -= b.speed * dt;
      return b.y > -20;
    });

    // Enemies
    enemyTimer -= dt;
    if (enemyTimer <= 0) {
      const spawnCount = Math.min(1 + Math.floor(wave / 3), 4);
      for (let i = 0; i < spawnCount; i++) spawnEnemy();
      enemyTimer = Math.max(20, 80 - wave * 5);
    }

    enemies = enemies.filter(e => {
      e.y += e.speed * dt;
      e.rot += e.rotSpeed * dt;
      return e.y < H + e.r * 2;
    });

    // Collision: bullets vs enemies
    for (let bi = bullets.length - 1; bi >= 0; bi--) {
      const b = bullets[bi];
      let hit = false;
      for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        const dx = b.x - e.x;
        const dy = b.y - e.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < e.r + b.w) {
          // Hit!
          makeExplosion(e.x, e.y, e.r, '#60a5fa');
          enemies.splice(ei, 1);
          score += 10 * wave;
          destroyed++;
          hit = true;

          // Wave progression
          if (destroyed % 15 === 0) {
            wave++;
            updateHUD();
          }
          break;
        }
      }
      if (hit) bullets.splice(bi, 1);
    }

    // Collision: enemies vs player
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const dx = e.x - player.x;
      const dy = e.y - player.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < e.r + player.w * 0.4) {
        makeExplosion(e.x, e.y, e.r * 0.8, '#60a5fa');
        enemies.splice(ei, 1);
        damagePlayer();
      }
    }

    // Enemies passing bottom = penalty
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      if (enemies[ei].y > H + enemies[ei].r) {
        enemies.splice(ei, 1);
        damagePlayer();
      }
    }

    updateHUD();
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Stars
    stars.forEach(s => {
      ctx.globalAlpha = 0.3 + s.bright * 0.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Enemies (asteroids)
    enemies.forEach(e => {
      ctx.save();
      ctx.translate(e.x, e.y);
      ctx.rotate(e.rot);

      // Body
      ctx.fillStyle = '#1e293b';
      ctx.strokeStyle = '#475569';
      ctx.lineWidth = 2;
      ctx.beginPath();
      e.vertices.forEach((v, i) => {
        const x = Math.cos(v.a) * v.d;
        const y = Math.sin(v.a) * v.d;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Danger glow
      ctx.shadowColor = '#f87171';
      ctx.shadowBlur = 12;
      ctx.strokeStyle = 'rgba(248,113,113,0.3)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.shadowBlur = 0;

      ctx.restore();
    });

    // Bullets
    bullets.forEach(b => {
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#4ade80';
      ctx.fillRect(b.x - b.w / 2, b.y - b.h / 2, b.w, b.h);
    });
    ctx.shadowBlur = 0;

    // Particles
    particles.forEach(p => {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Player ship (only when playing or paused)
    if (state === STATE.playing || state === STATE.paused || state === STATE.over) {
      const px = player.x;
      const py = player.y;

      ctx.save();
      ctx.translate(px, py);

      // Engine glow
      ctx.shadowColor = '#60a5fa';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#60a5fa';
      ctx.beginPath();
      ctx.ellipse(0, player.h / 2 + 6, 6, 10 + Math.random() * 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Ship body
      ctx.fillStyle = '#3b82f6';
      ctx.strokeStyle = '#93c5fd';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -player.h / 2);
      ctx.lineTo(-player.w / 2, player.h / 2);
      ctx.lineTo(-player.w / 4, player.h / 3);
      ctx.lineTo(player.w / 4, player.h / 3);
      ctx.lineTo(player.w / 2, player.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();

      // Cockpit
      ctx.fillStyle = '#93c5fd';
      ctx.beginPath();
      ctx.moveTo(0, -player.h / 4);
      ctx.lineTo(-6, player.h / 6);
      ctx.lineTo(6, player.h / 6);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }
  }

  /* ========== TOUCH CONTROLS ========== */
  let fireHeld = false;

  function addBtnHandlers(btn, onDown, onUp) {
    // Touch events — use { passive: false } so we can call preventDefault
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      btn.classList.add('active');
      onDown(e);
    }, { passive: false });

    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      btn.classList.remove('active');
      onUp(e);
    }, { passive: false });

    btn.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      btn.classList.remove('active');
      onUp(e);
    }, { passive: false });

    // Mouse fallback
    btn.addEventListener('mousedown', (e) => {
      btn.classList.add('active');
      onDown(e);
    });
    btn.addEventListener('mouseup', (e) => {
      btn.classList.remove('active');
      onUp(e);
    });
    btn.addEventListener('mouseleave', (e) => {
      btn.classList.remove('active');
      onUp(e);
    });
  }

  addBtnHandlers(
    document.getElementById('btn-left'),
    () => { moveLeft = true; },
    () => { moveLeft = false; }
  );

  addBtnHandlers(
    document.getElementById('btn-right'),
    () => { moveRight = true; },
    () => { moveRight = false; }
  );

  addBtnHandlers(
    document.getElementById('btn-fire'),
    () => {
      fireHeld = true;
      if (state === STATE.playing) shoot();
    },
    () => { fireHeld = false; }
  );

  // Button screen handlers
  document.getElementById('start-btn').addEventListener('click', startGame);
  document.getElementById('resume-btn').addEventListener('click', togglePause);
  document.getElementById('retry-btn').addEventListener('click', startGame);

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
    if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
    if (e.key === ' ' || e.key === 'ArrowUp') { shoot(); e.preventDefault(); }
    if (e.key === 'p' || e.key === 'Escape') togglePause();
  });
  document.addEventListener('keyup', (e) => {
    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
  });

  // Canvas tap-to-fire (tap on game area)
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (state === STATE.playing) shoot();
  }, { passive: false });

  /* ========== INIT ========== */
  resize();
  initStars();
  lastTime = performance.now();
  animId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
